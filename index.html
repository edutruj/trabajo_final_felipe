<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Portal de Reclutamiento</title>
    <!-- PWA para instalar como app -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4F46E5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        h1 {
            font-size: 28px;
            color: #1a1a2e;
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .file-input {
            padding: 10px;
            background: #f5f5f5;
            border-style: dashed;
            cursor: pointer;
        }
        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .status.loading {
            background: #e3f2fd;
            color: #0c5460;
            display: block;
        }
        .install-banner {
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .install-banner button {
            width: auto;
            background: #4F46E5;
            padding: 8px 20px;
            font-size: 14px;
        }
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
        }
        @media (max-width: 480px) {
            .card {
                padding: 24px 20px;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Portal de Reclutamiento</h1>
            <div class="subtitle">Postula a nuestras vacantes de manera rápida y sencilla</div>
            
            <form id="applicationForm">
                <div class="form-group">
                    <label>Correo electrónico *</label>
                    <input type="email" id="email" required placeholder="tu@email.com">
                </div>
                
                <div class="form-group">
                    <label>👤 Nombre completo *</label>
                    <input type="text" id="name" required placeholder="Tu nombre completo">
                </div>
                
                <div class="form-group">
                    <label>Teléfono (opcional)</label>
                    <input type="tel" id="phone" placeholder="+57 300 000 0000">
                </div>
                
                <div class="form-group">
                    <label>Vacante a la que postulas *</label>
                    <select id="vacancy">
                        <option value="1">Desarrollador Python Senior</option>
                        <option value="2">Desarrollador Full Stack</option>
                        <option value="3">Ingeniero de Datos</option>
                        <option value="4">DevOps Engineer</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>📎 Sube tu hoja de vida (PDF o DOCX) *</label>
                    <input type="file" id="cv" accept=".pdf,.docx" class="file-input" required>
                    <small style="color:#666; display:block; margin-top:5px;">Formatos aceptados: PDF, DOCX (máx. 5MB)</small>
                </div>
                
                <div class="form-group">
                    <label>Mensaje adicional (opcional)</label>
                    <textarea id="message" rows="3" placeholder="Cuéntanos por qué eres el candidato ideal..."></textarea>
                </div>
                
                <button type="submit" id="submitBtn">Enviar postulación</button>
            </form>
            
            <div id="status" class="status"></div>
        </div>
        
        <div id="installBanner" class="install-banner" style="display: none;">
            Instala esta app en tu dispositivo
            <button id="installBtn">Instalar</button>
        </div>
        
        <div class="footer">
            <p>Tus datos están seguros. Evaluación automática con IA.</p>
            <p>Después de enviar, recibirás la respuesta por correo y Telegram</p>
        </div>
    </div>

    <script>
       
        const WEBHOOK_URL = 'https://teresita-mouill-unpossessively.ngrok-free.dev/webhook-test/webhook/candidato';
        
        // PWA - Instalación como app
        let deferredPrompt;
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBanner').style.display = 'flex';
        });
        
        document.getElementById('installBtn')?.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('installBanner').style.display = 'none';
                }
                deferredPrompt = null;
            }
        });
        
        // Envío del formulario
        document.getElementById('applicationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('status');
            
            // Validar campos
            const email = document.getElementById('email').value;
            const name = document.getElementById('name').value;
            const cvFile = document.getElementById('cv').files[0];
            
            if (!email || !name || !cvFile) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = 'Por favor completa todos los campos obligatorios.';
                return;
            }
            
            // Validar tamaño del archivo (5MB)
            if (cvFile.size > 5 * 1024 * 1024) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = 'El archivo no debe superar los 5MB.';
                return;
            }
            
            // Estado de carga
            submitBtn.disabled = true;
            submitBtn.textContent = 'Enviando...';
            statusDiv.className = 'status loading';
            statusDiv.innerHTML = 'Subiendo tu hoja de vida...';
            
            try {
                // Leer el archivo como base64
                const reader = new FileReader();
                
                reader.onloadend = async function() {
                    const base64File = reader.result.split(',')[1];
                    
                    const payload = {
                        email: email,
                        nombre: name,
                        telefono: document.getElementById('phone').value,
                        vacante_id: document.getElementById('vacancy').value,
                        cv_base64: base64File,
                        cv_filename: cvFile.name,
                        cv_mimetype: cvFile.type,
                        mensaje: document.getElementById('message').value,
                        fecha: new Date().toISOString()
                    };
                    
                    try {
                        const response = await fetch(WEBHOOK_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json'
                                     'ngrok-skip-browser-warning': 'true'  
                                },
                            body: JSON.stringify(payload)
                        });
                        
                        const result = await response.json();
                        
                        if (response.ok) {
                            statusDiv.className = 'status success';
                            statusDiv.innerHTML = `
                                <strong>¡Postulación enviada!</strong><br>
                                Recibirás los resultados en <strong>${email}</strong><br>
                                También te notificaremos por Telegram si nos proporcionaste tu número.
                            `;
                            document.getElementById('applicationForm').reset();
                        } else {
                            throw new Error(result.error || 'Error al enviar');
                        }
                    } catch (err) {
                        statusDiv.className = 'status error';
                        statusDiv.innerHTML = `Error: ${err.message}. Intenta nuevamente.`;
                    } finally {
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Enviar postulación';
                    }
                };
                
                reader.readAsDataURL(cvFile);
                
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `Error: ${error.message}`;
                submitBtn.disabled = false;
                submitBtn.textContent = 'Enviar postulación';
            }
        });
    </script>
</body>
</html>
